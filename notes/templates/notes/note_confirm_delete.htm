<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Видалити нотатку</title>
  </head>
  <body>
    <h1>Ви впевнені, що хочете видалити нотатку "{{ object.title }}"?</h1>
    <form method="post">
      {% csrf_token %}
      <button
        type="submit"
        style="background-color: red; color: white; padding: 5px 10px"
      >
        Так, видалити остаточно
      </button>
      <a href="{% url 'note_detail' object.pk %}">Скасувати</a>
    </form>
  </body>
</html>
